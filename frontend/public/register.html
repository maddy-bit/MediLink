<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | MediLink Healthcare</title>
  <!-- Google Fonts & Custom CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Glassmorphic Header -->
  <header class="header">
    <div class="container header-container">
      <a href="/" class="logo">
        <div class="logo-icon">
          <i data-lucide="activity"></i>
        </div>
        <span>MediLink</span>
      </a>

      <div class="auth-buttons">
        <a href="/login" class="btn btn-outline">Log In</a>
      </div>
    </div>
  </header>

  <!-- Registration Form Section -->
  <main class="auth-layout">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join MediLink to book appointments and check procedures</p>
      </div>

      <!-- Alert Box -->
      <div id="alertBox" class="alert-popup"></div>

      <form id="registerForm">
        <div class="auth-field">
          <label for="name" class="booking-field-label">Full Name</label>
          <input type="text" id="name" class="auth-input" placeholder="John Doe" required>
        </div>

        <div class="auth-field">
          <label for="email" class="booking-field-label">Email Address</label>
          <div style="display: flex; gap: 8px;">
            <input type="email" id="email" class="auth-input" placeholder="name@example.com" required style="flex: 1;">
            <button type="button" class="btn btn-outline" id="btnSendOtp" style="padding: 10px 14px; white-space: nowrap; font-size: 13px;">Send OTP</button>
          </div>
        </div>

        <div class="auth-field" id="otpFieldContainer" style="display: none; margin-top: 12px; animation: fadeIn 0.3s ease;">
          <label for="otpInput" class="booking-field-label">Enter 6-Digit OTP</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="otpInput" class="auth-input" placeholder="Enter OTP (e.g. 123456)" maxlength="6" style="flex: 1;">
            <button type="button" class="btn btn-accent" id="btnVerifyOtp" style="padding: 10px 14px; white-space: nowrap; background: var(--accent); font-size: 13px;">Verify OTP</button>
          </div>
          <small id="otpHelpText" style="display: block; margin-top: 6px; font-size: 11px; color: var(--gray-400); font-weight: 500;"></small>
        </div>

        <div class="auth-field">
          <label for="password" class="booking-field-label">Password (Min 6 characters)</label>
          <input type="password" id="password" class="auth-input" placeholder="Create password" required minlength="6">
        </div>

        <!-- Role Selection Cards -->
        <div class="auth-field">
          <label class="booking-field-label">Register As</label>
          <div class="auth-role-group">
            <div class="auth-role-option">
              <input type="radio" id="rolePatient" name="role" value="patient" checked>
              <label for="rolePatient" class="auth-role-label">
                <i data-lucide="user" style="margin-bottom: 4px; width: 18px;"></i>
                <span>Patient</span>
              </label>
            </div>
            <div class="auth-role-option">
              <input type="radio" id="roleAdmin" name="role" value="admin">
              <label for="roleAdmin" class="auth-role-label">
                <i data-lucide="building-2" style="margin-bottom: 4px; width: 18px;"></i>
                <span>Hospital Admin</span>
              </label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-accent" id="btnSubmitRegister" style="width: 100%; margin-top: 10px; padding: 14px;" disabled>
          Create Account <i data-lucide="user-plus" style="width: 16px;"></i>
        </button>
      </form>

      <div class="auth-footer-prompt">
        Already have an account? <a href="/login">Log in here</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2026 MediLink Healthcare. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Initialize icons
    lucide.createIcons();
  </script>
</body>
</html>
