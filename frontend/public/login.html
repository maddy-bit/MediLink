<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MediLink Healthcare</title>
  <!-- Google Fonts & Custom CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Glassmorphic Header -->
  <header class="header">
    <div class="container header-container">
      <a href="/" class="logo">
        <div class="logo-icon">
          <i data-lucide="activity"></i>
        </div>
        <span>MediLink</span>
      </a>

      <div class="auth-buttons">
        <a href="/register" class="btn btn-outline">Sign Up</a>
      </div>
    </div>
  </header>

  <!-- Login Form Section -->
  <main class="auth-layout">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Access your booking records and appointments</p>
      </div>

      <!-- Alert Box -->
      <div id="alertBox" class="alert-popup"></div>

      <form id="loginForm">
        <div class="auth-field">
          <label for="email" class="booking-field-label">Email Address</label>
          <input type="email" id="email" class="auth-input" placeholder="name@example.com" required>
        </div>

        <div class="auth-field">
          <label for="password" class="booking-field-label">Password</label>
          <input type="password" id="password" class="auth-input" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 10px; padding: 14px;">
          Log In <i data-lucide="log-in" style="width: 16px;"></i>
        </button>
      </form>

      <div class="auth-footer-prompt">
        Don't have an account? <a href="/register">Sign up here</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2026 MediLink Healthcare. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Initialize icons
    lucide.createIcons();
  </script>
</body>
</html>
